version: "3.9"
services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  postgres_rds:
    image: postgres:16
    container_name: rds-db
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=rds_user
      - POSTGRES_DB=postgres_rds
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rds_user -d postgres_rds"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_vector:
    image: ankane/pgvector:v0.4.0
    container_name: vector-db
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=vector_user
      - POSTGRES_DB=vector_db
    ports:
      - 5433:5432
    volumes:
      - postgres_vector:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vector_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio:/data

  upload-service:
    build: ./services/upload-service
    container_name: upload-service
    restart: unless-stopped
    ports:
      - 8001:8001
    volumes:
      - ./services/upload-service:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - RDS_DB_HOST=postgres_rds
      - RDS_DB_PORT=5432
      - RDS_DB_USER=rds_user
      - RDS_DB_PASSWORD=postgres
      - RDS_DB_NAME=postgres_rds
      - VECTOR_DB_HOST=postgres_vector
      - VECTOR_DB_PORT=5432
      - VECTOR_DB_USER=vector_user
      - VECTOR_DB_PASSWORD=postgres
      - VECTOR_DB_NAME=vector_db
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minio
      - S3_SECRET_KEY=minio123
      - S3_BUCKET=documents
      - S3_REGION=us-east-1
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq:5672
    depends_on:
      postgres_rds:
        condition: service_healthy
      postgres_vector:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_started
    env_file:
      - .env

volumes:
  postgres_data:
  postgres_vector:
  minio:
  rabbitmq_data:
