version: "3.9"
services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  postgres_rds:
    image: postgres:16
    container_name: rds-db
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=rds_user
      - POSTGRES_DB=postgres_rds
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rds_user -d postgres_rds"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_vector:
    image: ankane/pgvector:v0.4.0
    container_name: vector-db
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=vector_user
      - POSTGRES_DB=vector_db
    ports:
      - 5433:5432
    volumes:
      - postgres_vector:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vector_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio:/data

  upload-service:
    build: ./services/upload-service
    container_name: upload-service
    restart: unless-stopped
    ports:
      - 8001:8001
    volumes:
      - ./services/upload-service:/app
      - /app/node_modules
    command: npm run dev
    develop:
      watch:
        - action: sync
          path: ./services/upload-service
          target: /app
          ignore:
            - node_modules
            - dist
        - action: rebuild
          path: ./services/upload-service/package.json
    environment:
      - RDS_DB_HOST={RDS_DB_HOST}
      - RDS_DB_PORT={RDS_DB_PORT}
      - RDS_DB_USER={RDS_DB_USER}
      - RDS_DB_PASSWORD={RDS_DB_PASSWORD}
      - RDS_DB_NAME={RDS_DB_NAME}
      - VECTOR_DB_HOST={VECTOR_DB_HOST}
      - VECTOR_DB_PORT={VECTOR_DB_PORT}
      - VECTOR_DB_USER={VECTOR_DB_USER}
      - VECTOR_DB_PASSWORD={VECTOR_DB_PASSWORD}
      - VECTOR_DB_NAME={VECTOR_DB_NAME}
      - S3_ENDPOINT={S3_ENDPOINT}
      - S3_ACCESS_KEY={S3_ACCESS_KEY}
      - S3_SECRET_KEY={S3_SECRET_KEY}
      - S3_BUCKET={S3_BUCKET}
      - S3_REGION={S3_REGION}
      - RABBITMQ_URL={RABBITMQ_URL}
    depends_on:
      postgres_rds:
        condition: service_healthy
      postgres_vector:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env

  embedding-service:
    build: ./services/embedding-service
    container_name: embedding-service
    restart: unless-stopped
    ports:
      - 8002:8002
    volumes:
      - ./services/embedding-service:/app
      - /app/node_modules
    command: npm run dev
    develop:
      watch:
        - action: sync
          path: ./services/embedding-service
          target: /app
          ignore:
            - dist
        - action: rebuild
          path: ./services/embedding-service/package.json
    environment:
      - RDS_DB_HOST={RDS_DB_HOST}
      - RDS_DB_PORT={RDS_DB_PORT}
      - RDS_DB_USER={RDS_DB_USER}
      - RDS_DB_PASSWORD={RDS_DB_PASSWORD}
      - RDS_DB_NAME={RDS_DB_NAME}
      - VECTOR_DB_HOST={VECTOR_DB_HOST}
      - VECTOR_DB_PORT={VECTOR_DB_PORT}
      - VECTOR_DB_USER={VECTOR_DB_USER}
      - VECTOR_DB_PASSWORD={VECTOR_DB_PASSWORD}
      - VECTOR_DB_NAME={VECTOR_DB_NAME}
      - S3_ENDPOINT={S3_ENDPOINT}
      - S3_ACCESS_KEY={S3_ACCESS_KEY}
      - S3_SECRET_KEY={S3_SECRET_KEY}
      - S3_BUCKET={S3_BUCKET}
      - S3_REGION={S3_REGION}
      - RABBITMQ_URL={RABBITMQ_URL}
      - OPENROUTER_API_KEY={OPENROUTER_API_KEY}
      - HUGGING_FACE_TOKEN={HUGGING_FACE_TOKEN}
    depends_on:
      postgres_rds:
        condition: service_healthy
      postgres_vector:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env

volumes:
  postgres_data:
  postgres_vector:
  minio:
  rabbitmq_data:
